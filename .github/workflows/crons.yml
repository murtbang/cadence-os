name: Cadence Cron Jobs

# ─────────────────────────────────────────────────────────────────────────────
# Free alternative to Vercel Cron: GitHub Actions pings your deployment's cron
# routes on a schedule.
#
# DISABLED BY DEFAULT (the `schedule:` block below is commented out) so a fresh
# clone or fork never runs — and never spams failure emails — before you've
# pointed it at your own deployment.
#
# To enable it on YOUR deployment:
#   1. Replace every `YOUR_APP.vercel.app` below with your real domain.
#   2. Repo → Settings → Secrets and variables → Actions → New repository secret
#      → add `CRON_SECRET` (the same value as in your Vercel env).
#   3. Uncomment the `schedule:` block below.
#   4. Repo → Actions tab → enable workflows if GitHub prompts you.
#
# Cron times are in UTC — adjust for your timezone. Sub-hourly schedules on
# GitHub Actions are best-effort and can be delayed under load.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # schedule:
  #   - cron: '*/15 * * * *'   # every 15 min — calendar alert
  #   - cron: '0 14 * * *'     # daily summary
  #   - cron: '0 18 * * *'     # AM habit reminder
  #   - cron: '0 5 * * *'      # PM habit reminder
  workflow_dispatch:            # manual trigger — runs all jobs

jobs:
  calendar-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Ping calendar alert
        run: |
          curl -sf -X GET "https://YOUR_APP.vercel.app/api/cron/calendar-alert" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  daily-summary:
    if: github.event.schedule == '0 14 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping daily summary
        run: |
          curl -sf -X GET "https://YOUR_APP.vercel.app/api/cron/summary" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  habits-am:
    if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping AM habit reminder
        run: |
          curl -sf -X GET "https://YOUR_APP.vercel.app/api/cron/habits-am" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  habits-pm:
    if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping PM habit reminder
        run: |
          curl -sf -X GET "https://YOUR_APP.vercel.app/api/cron/habits-pm" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
